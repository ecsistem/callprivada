# Reverse proxy principal — termina TLS e roteia para frontend/backend.
# HTTPS real (certificados) é configurado na Fase 13 (Deploy). Em dev,
# expõe só HTTP na porta 80.

server {
    listen 80;
    server_name _;

    # Resolver Docker interno — necessário para proxy_pass com variáveis
    resolver 127.0.0.11 valid=5s ipv6=off;

    client_max_body_size 2200m;

    location /api/ {
        set $backend http://backend:8080;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws/ {
        set $backend http://backend:8080;
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    location / {
        set $frontend http://frontend:80;
        proxy_pass $frontend;
        proxy_set_header Host $host;
    }
}

